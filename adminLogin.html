<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="css/adminLogin.css">
    <link rel="icon" href="assets/images/icons/ja-icon.png" type="image/png" />
</head>

<body>

    <div class="login-card">

        <header class="login-header">
            <span class="login-badge">Painel Administrativo</span>
            <h1>Acesso Restrito</h1>
            <p>Entre com suas credenciais para acessar o painel de administração.</p>
        </header>

        <form class="login-form" id="loginForm">

            <div class="field">
                <label for="email">E-mail</label>
                <input id="email" type="email" placeholder="admin@jogadoresanonimos.org.br" required />
            </div>

            <div class="field">
                <label for="senha">Senha</label>
                <input id="senha" type="password" placeholder="Digite sua senha" required />
            </div>

            <button type="submit" class="btn-entrar">Entrar no Painel</button>

        </form>

    </div>

</body>

</html>
