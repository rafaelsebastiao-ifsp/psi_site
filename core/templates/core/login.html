{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Jogadores Anônimos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="icon" href="{% static 'assets/images/icons/ja-icon.png' %}" type="image/png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cor-padrao-ja: #742C24;
      --yellow-gold:   #D4A843;
      --text-dark:     #1e293b;
      --text-muted:    #64748b;
      --white:         #ffffff;
      --gray-100:      #F0F9FF;
    }
    body {
      min-height: 100vh;
      font-family: 'Sora', sans-serif;
      background: var(--gray-100);
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    nav {
      background: var(--cor-padrao-ja);
      height: 72px;
      display: flex;
      align-items: center;
      padding: 0 clamp(20px, 5vw, 60px);
    }
    .nav-logo {
      display: flex; align-items: center; gap: 12px;
      text-decoration: none;
    }
    .nav-logo svg { width: 40px; height: 40px; flex-shrink: 0; }
    .nav-logo-text { display: flex; flex-direction: column; line-height: 1.15; }
    .nav-logo-text span:first-child { font-size: .85rem; font-weight: 700; color: #fff; letter-spacing: .06em; }
    .nav-logo-text span:nth-child(2) { font-size: .95rem; font-weight: 800; color: var(--yellow-gold); letter-spacing: .06em; }
    .nav-logo-text span:last-child   { font-size: 6px; color: #fff; letter-spacing: .06em; opacity: .8; }
    .nav-accent { height: 4px; background: var(--yellow-gold); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .login-card {
      background: var(--white);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(116,44,36,.12);
      padding: 52px 48px;
      width: 100%;
      max-width: 460px;
    }

    .login-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-bottom: 40px;
    }
    .login-logo .circle-icon {
      width: 72px; height: 72px;
      background: var(--cor-padrao-ja);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo .circle-icon svg { width: 38px; height: 38px; }
    .login-logo h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--cor-padrao-ja);
      text-align: center;
    }
    .login-logo p {
      font-size: .9rem;
      color: var(--text-muted);
      text-align: center;
    }

    .form-group {
      margin-bottom: 24px;
    }
    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 14px 18px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: .95rem;
      color: var(--text-dark);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .form-group input:focus {
      border-color: var(--cor-padrao-ja);
      box-shadow: 0 0 0 3px rgba(116,44,36,.1);
    }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--cor-padrao-ja);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: 'Sora', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, background .2s;
      margin-top: 8px;
    }
    .btn-login:hover {
      background: #8f3629;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(116,44,36,.3);
    }

    .error-msg {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #b91c1c;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 20px;
      display: {% if error %}flex{% else %}none{% endif %};
      align-items: center;
      gap: 8px;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: .875rem;
      text-decoration: none;
    }
    .back-link:hover { color: var(--cor-padrao-ja); }

    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: .8rem;
    }

    @media (max-width: 520px) {
      .login-card { padding: 36px 24px; }
    }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/">
      <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="22" cy="22" r="20" stroke="#ffffff" stroke-width="2.5"/>
        <circle cx="22" cy="22" r="13" stroke="#ffffff" stroke-width="2"/>
        <circle cx="22" cy="22" r="6" fill="#D4A843"/>
      </svg>
      <div class="nav-logo-text">
        <span>JOGADORES</span>
        <span>ANÔNIMOS</span>
        <span>APOIO AO JOGADOR COMPULSIVO DO ANONIMATO</span>
      </div>
    </a>
  </nav>
  <div class="nav-accent"></div>

  <main>
    <div class="login-card">
      <div class="login-logo">
        <div class="circle-icon">
          <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M19 4C13.477 4 9 8.477 9 14C9 17.31 10.672 20.22 13.2 22H24.8C27.328 20.22 29 17.31 29 14C29 8.477 24.523 4 19 4Z" stroke="#D4A843" stroke-width="2" stroke-linejoin="round"/>
            <path d="M14 22V28C14 30.209 16.239 32 19 32C21.761 32 24 30.209 24 28V22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
            <path d="M16 26H22" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <h1>Área Administrativa</h1>
        <p>Faça login para acessar o painel de gerenciamento</p>
      </div>

      {% if error %}
      <div class="error-msg" style="display:flex;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" name="username" placeholder="Digite seu usuário"
                 value="{{ username|default:'' }}" autocomplete="username" required />
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="Digite sua senha"
                 autocomplete="current-password" required />
        </div>
        <button type="submit" class="btn-login">Entrar no Painel</button>
      </form>

      <a href="/" class="back-link">← Voltar ao site</a>
    </div>
  </main>

  <footer>© Jogadores Anônimos — Painel Administrativo</footer>
</body>
</html>
